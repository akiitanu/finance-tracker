<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0a">
    <title>Finance Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
            background: #0a0a0a;
            color: #f5f5f5;
            min-height: 100vh;
            padding-bottom: 80px;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Tab pages */
        .page { display: none; }
        .page.active { display: block; }

        /* Bottom tab bar */
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(10, 10, 10, 0.92);
            border-top: 1px solid #1a1a1a;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            z-index: 500;
        }

        .tab-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            border: none;
            background: transparent;
            color: #444;
            cursor: pointer;
            transition: color 0.15s;
            padding-bottom: 6px;
        }

        .tab-item.active { color: #f5f5f5; }

        .tab-icon { font-size: 22px; line-height: 1; }
        .tab-label { font-size: 10px; letter-spacing: 0.5px; font-weight: 500; }

        /* Header */
        .header {
            text-align: center;
            padding: 60px 0 40px;
        }

        .header-label {
            font-size: 12px;
            font-weight: 500;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            margin-bottom: 12px;
        }

        .balance {
            font-size: 52px;
            font-weight: 200;
            letter-spacing: -2px;
            color: #f5f5f5;
            line-height: 1;
        }

        .balance.positive { color: #34c759; }
        .balance.negative { color: #ff3b30; }

        .balance-sub {
            font-size: 12px;
            color: #444;
            margin-top: 8px;
            letter-spacing: 1px;
        }

        /* Stats */
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 28px;
        }

        .stat-card {
            background: #111;
            border: 1px solid #1e1e1e;
            padding: 18px 16px;
            border-radius: 16px;
        }

        .stat-label {
            font-size: 11px;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 22px;
            font-weight: 300;
            letter-spacing: -0.5px;
        }

        .stat-value.income { color: #34c759; }
        .stat-value.expense { color: #ff3b30; }

        /* Add Button */
        .add-btn {
            width: 100%;
            padding: 16px;
            background: #f5f5f5;
            color: #0a0a0a;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 36px;
            letter-spacing: 0.2px;
            transition: opacity 0.15s;
        }

        .add-btn:active { opacity: 0.7; }

        /* Section title */
        .section-title {
            font-size: 11px;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 14px;
        }

        /* Transactions */
        .transaction-list { display: flex; flex-direction: column; gap: 6px; }

        .transaction-item {
            background: #111;
            border: 1px solid #1a1a1a;
            padding: 14px 16px;
            border-radius: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: opacity 0.15s;
        }

        .transaction-item:active { opacity: 0.7; }
        .transaction-info { display: flex; align-items: center; gap: 12px; }

        .transaction-icon {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 17px;
            flex-shrink: 0;
        }

        .transaction-icon.income { background: rgba(52, 199, 89, 0.12); }
        .transaction-icon.expense { background: rgba(255, 59, 48, 0.12); }

        .transaction-details h3 { font-size: 14px; font-weight: 500; color: #f5f5f5; margin-bottom: 2px; }
        .transaction-details p { font-size: 12px; color: #444; }

        .transaction-right { display: flex; align-items: center; gap: 10px; }

        .transaction-amount { font-size: 15px; font-weight: 500; letter-spacing: -0.3px; }
        .transaction-amount.income { color: #34c759; }
        .transaction-amount.expense { color: #ff3b30; }

        .delete-btn {
            background: transparent;
            color: #333;
            border: none;
            font-size: 17px;
            cursor: pointer;
            padding: 4px;
            line-height: 1;
            transition: color 0.15s;
        }

        .delete-btn:hover { color: #ff3b30; }

        /* Empty state */
        .empty-state { text-align: center; padding: 60px 20px; color: #333; }
        .empty-state-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }
        .empty-state p { font-size: 14px; color: #444; }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        .modal.active {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .modal-content {
            background: #111;
            border: 1px solid #1e1e1e;
            width: 100%;
            max-width: 480px;
            border-radius: 24px 24px 0 0;
            padding: 28px 24px 40px;
            animation: slideUp 0.3s cubic-bezier(0.32, 0.72, 0, 1);
            max-height: 88vh;
            overflow-y: auto;
        }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .modal-title { font-size: 18px; font-weight: 600; color: #f5f5f5; }

        .close-btn {
            width: 28px;
            height: 28px;
            background: #1e1e1e;
            border: none;
            border-radius: 50%;
            color: #888;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        /* Type toggle */
        .type-toggle {
            display: flex;
            background: #1a1a1a;
            border-radius: 12px;
            padding: 3px;
            margin-bottom: 24px;
        }

        .type-btn {
            flex: 1;
            padding: 11px;
            border: none;
            background: transparent;
            color: #555;
            font-size: 14px;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.2px;
        }

        .type-btn.income.active { background: rgba(52, 199, 89, 0.15); color: #34c759; }
        .type-btn.expense.active { background: rgba(255, 59, 48, 0.15); color: #ff3b30; }

        /* Form */
        .form-group { margin-bottom: 22px; }

        .form-label {
            display: block;
            font-size: 11px;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
        }

        .amount-input {
            width: 100%;
            padding: 18px;
            background: #1a1a1a;
            border: 1px solid #222;
            border-radius: 14px;
            color: #f5f5f5;
            font-size: 36px;
            font-weight: 200;
            text-align: center;
            outline: none;
            letter-spacing: -1px;
            transition: border-color 0.2s;
        }

        .amount-input:focus { border-color: #333; }
        .amount-input::placeholder { color: #2a2a2a; }

        /* Category grid */
        .category-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }

        .category-btn {
            padding: 12px 8px;
            background: #1a1a1a;
            border: 1px solid transparent;
            border-radius: 12px;
            color: #888;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.15s;
            text-align: center;
            line-height: 1.4;
        }

        .category-btn:active { opacity: 0.7; }

        .category-btn.selected { border-color: #333; background: #1e1e1e; color: #f5f5f5; }
        .category-emoji { font-size: 20px; display: block; margin-bottom: 4px; }

        /* Submit button */
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: #f5f5f5;
            color: #0a0a0a;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 24px;
            letter-spacing: 0.2px;
            transition: opacity 0.15s;
        }

        .submit-btn:active { opacity: 0.7; }

        /* Category breakdown */
        .breakdown-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 36px; }

        .breakdown-item {
            background: #111;
            border: 1px solid #1a1a1a;
            padding: 14px 16px;
            border-radius: 14px;
        }

        .breakdown-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .breakdown-left { display: flex; align-items: center; gap: 10px; }
        .breakdown-emoji { font-size: 18px; }
        .breakdown-name { font-size: 14px; font-weight: 500; color: #f5f5f5; }
        .breakdown-amount { font-size: 14px; font-weight: 500; color: #ff3b30; }

        .breakdown-bar-track { height: 3px; background: #1e1e1e; border-radius: 2px; overflow: hidden; }

        .breakdown-bar-fill {
            height: 100%;
            background: #ff3b30;
            border-radius: 2px;
            opacity: 0.6;
            transition: width 0.4s ease;
        }

        /* Monthly page */
        .month-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 50px 0 32px;
        }

        .month-nav-btn {
            width: 36px;
            height: 36px;
            background: #111;
            border: 1px solid #1e1e1e;
            border-radius: 10px;
            color: #888;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.15s;
        }

        .month-nav-btn:active { opacity: 0.6; }

        .month-title {
            font-size: 22px;
            font-weight: 300;
            letter-spacing: -0.5px;
            color: #f5f5f5;
        }

        .month-stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 32px;
        }

        .month-stat {
            background: #111;
            border: 1px solid #1e1e1e;
            padding: 14px 12px;
            border-radius: 16px;
            text-align: center;
        }

        .month-stat .stat-label { margin-bottom: 6px; }

        .month-stat .stat-value {
            font-size: 17px;
            font-weight: 400;
            letter-spacing: -0.3px;
        }

        .stat-value.neutral { color: #f5f5f5; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 4px; }
    </style>
</head>
<body>

    <!-- Home Tab -->
    <div class="page active" id="page-home">
        <div class="container">
            <div class="header">
                <div class="header-label">Total Balance</div>
                <div class="balance" id="balance">₸0</div>
                <div class="balance-sub">All time</div>
            </div>

            <div class="stats">
                <div class="stat-card">
                    <div class="stat-label">Income</div>
                    <div class="stat-value income" id="totalIncome">₸0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Expenses</div>
                    <div class="stat-value expense" id="totalExpense">₸0</div>
                </div>
            </div>

            <button class="add-btn" onclick="openModal()">+ Add Transaction</button>

            <div class="section-title">By Category</div>
            <div class="breakdown-list" id="breakdownList"></div>

            <div class="section-title">Recent</div>
            <div class="transaction-list" id="transactionList">
                <div class="empty-state">
                    <div class="empty-state-icon">○</div>
                    <p>No transactions yet</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Monthly Tab -->
    <div class="page" id="page-monthly">
        <div class="container">
            <div class="month-nav">
                <button class="month-nav-btn" onclick="changeMonth(-1)">‹</button>
                <span class="month-title" id="monthTitle"></span>
                <button class="month-nav-btn" onclick="changeMonth(1)">›</button>
            </div>

            <div class="month-stats">
                <div class="month-stat">
                    <div class="stat-label">Income</div>
                    <div class="stat-value income" id="mIncome">₸0</div>
                </div>
                <div class="month-stat">
                    <div class="stat-label">Expenses</div>
                    <div class="stat-value expense" id="mExpense">₸0</div>
                </div>
                <div class="month-stat">
                    <div class="stat-label">Net</div>
                    <div class="stat-value neutral" id="mNet">₸0</div>
                </div>
            </div>

            <div class="section-title">By Category</div>
            <div class="breakdown-list" id="mBreakdownList"></div>

            <div class="section-title">Transactions</div>
            <div class="transaction-list" id="mTransactionList"></div>
        </div>
    </div>

    <!-- Tab Bar -->
    <div class="tab-bar">
        <button class="tab-item active" id="tab-home" onclick="switchTab('home')">
            <span class="tab-icon">○</span>
            <span class="tab-label">Home</span>
        </button>
        <button class="tab-item" id="tab-monthly" onclick="switchTab('monthly')">
            <span class="tab-icon">◫</span>
            <span class="tab-label">Monthly</span>
        </button>
    </div>

    <!-- Modal -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-title">New Transaction</span>
                <button class="close-btn" onclick="closeModal()">×</button>
            </div>

            <div class="type-toggle">
                <button class="type-btn expense active" onclick="setType('expense')">Expense</button>
                <button class="type-btn income" onclick="setType('income')">Income</button>
            </div>

            <div class="form-group">
                <label class="form-label">Amount (₸)</label>
                <input type="number" class="amount-input" id="amount" placeholder="0">
            </div>

            <div class="form-group">
                <label class="form-label">Category</label>
                <div class="category-grid" id="categoryGrid"></div>
            </div>

            <button class="submit-btn" onclick="submitTransaction()">Add Transaction</button>
        </div>
    </div>

    <script>
        let transactions = JSON.parse(localStorage.getItem('financeTransactions')) || [];
        let currentType = 'expense';
        let selectedCategory = null;

        const now = new Date();
        let viewYear = now.getFullYear();
        let viewMonth = now.getMonth();

        const categories = {
            income: ['Stipend', 'Turlan aga', 'Father', 'Other'],
            expense: ['Cafes', 'Cigarettes', 'Clothing', 'Entertainment', 'Food', 'Kaspi Payment', 'Other', 'Sports', 'Study', 'Subscriptions', 'Taxi', 'Transport']
        };

        const icons = {
            'Stipend': '🎓', 'Turlan aga': '👤', 'Father': '👨', 'Other': '📦',
            'Cafes': '☕', 'Cigarettes': '🚬', 'Clothing': '👕', 'Entertainment': '🎮',
            'Food': '🍔', 'Kaspi Payment': '💳', 'Sports': '⚽', 'Study': '📚',
            'Subscriptions': '📺', 'Taxi': '🚕', 'Transport': '🚌'
        };

        updateUI();
        renderCategories();
        renderMonthly();

        // Tab switching
        function switchTab(tab) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            document.getElementById('page-' + tab).classList.add('active');
            document.getElementById('tab-' + tab).classList.add('active');
        }

        // Month navigation
        function changeMonth(dir) {
            viewMonth += dir;
            if (viewMonth > 11) { viewMonth = 0; viewYear++; }
            if (viewMonth < 0) { viewMonth = 11; viewYear--; }
            renderMonthly();
        }

        function renderMonthly() {
            const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
            document.getElementById('monthTitle').textContent = `${monthNames[viewMonth]} ${viewYear}`;

            const monthTx = transactions.filter(t => {
                const d = new Date(t.date);
                return d.getFullYear() === viewYear && d.getMonth() === viewMonth;
            });

            const income = monthTx.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
            const expense = monthTx.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
            const net = income - expense;

            document.getElementById('mIncome').textContent = `₸${income.toLocaleString()}`;
            document.getElementById('mExpense').textContent = `₸${expense.toLocaleString()}`;

            const netEl = document.getElementById('mNet');
            netEl.textContent = `₸${Math.abs(net).toLocaleString()}`;
            netEl.className = `stat-value ${net >= 0 ? 'income' : 'expense'}`;

            // Category breakdown
            const breakdownEl = document.getElementById('mBreakdownList');
            const expTx = monthTx.filter(t => t.type === 'expense');
            if (expTx.length === 0) {
                breakdownEl.innerHTML = `<div class="empty-state" style="padding:24px 20px"><p>No expenses this month</p></div>`;
            } else {
                const totals = {};
                expTx.forEach(t => { totals[t.category] = (totals[t.category] || 0) + t.amount; });
                const max = Math.max(...Object.values(totals));
                const sorted = Object.entries(totals).sort((a, b) => b[1] - a[1]);
                breakdownEl.innerHTML = sorted.map(([cat, total]) => `
                    <div class="breakdown-item">
                        <div class="breakdown-row">
                            <div class="breakdown-left">
                                <span class="breakdown-emoji">${icons[cat] || '📁'}</span>
                                <span class="breakdown-name">${cat}</span>
                            </div>
                            <span class="breakdown-amount">−₸${total.toLocaleString()}</span>
                        </div>
                        <div class="breakdown-bar-track">
                            <div class="breakdown-bar-fill" style="width:${(total/max*100).toFixed(1)}%"></div>
                        </div>
                    </div>
                `).join('');
            }

            // Transaction list
            const listEl = document.getElementById('mTransactionList');
            if (monthTx.length === 0) {
                listEl.innerHTML = `<div class="empty-state"><div class="empty-state-icon">○</div><p>No transactions this month</p></div>`;
            } else {
                listEl.innerHTML = monthTx.map(t => `
                    <div class="transaction-item">
                        <div class="transaction-info">
                            <div class="transaction-icon ${t.type}">${icons[t.category] || '📁'}</div>
                            <div class="transaction-details">
                                <h3>${t.category}</h3>
                                <p>${new Date(t.date).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' })}</p>
                            </div>
                        </div>
                        <div class="transaction-right">
                            <span class="transaction-amount ${t.type}">${t.type === 'income' ? '+' : '−'}₸${t.amount.toLocaleString()}</span>
                            <button class="delete-btn" onclick="deleteTransaction(${t.id})">×</button>
                        </div>
                    </div>
                `).join('');
            }
        }

        // Modal
        function openModal() {
            document.getElementById('modal').classList.add('active');
            document.getElementById('amount').value = '';
            selectedCategory = null;
            renderCategories();
            setTimeout(() => document.getElementById('amount').focus(), 300);
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        function setType(type) {
            currentType = type;
            document.querySelectorAll('.type-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.type-btn.${type}`).classList.add('active');
            selectedCategory = null;
            renderCategories();
        }

        function renderCategories() {
            const grid = document.getElementById('categoryGrid');
            grid.innerHTML = categories[currentType].map(cat => `
                <button class="category-btn ${selectedCategory === cat ? 'selected' : ''}" onclick="selectCategory('${cat}')">
                    <span class="category-emoji">${icons[cat] || '📁'}</span>${cat}
                </button>
            `).join('');
        }

        function selectCategory(cat) {
            selectedCategory = cat;
            renderCategories();
        }

        function submitTransaction() {
            const amount = parseFloat(document.getElementById('amount').value);
            if (!amount || amount <= 0) { alert('Please enter an amount'); return; }
            if (!selectedCategory) { alert('Please select a category'); return; }

            transactions.unshift({
                id: Date.now(),
                type: currentType,
                amount,
                category: selectedCategory,
                date: new Date().toISOString()
            });

            localStorage.setItem('financeTransactions', JSON.stringify(transactions));
            updateUI();
            renderMonthly();
            closeModal();
        }

        function deleteTransaction(id) {
            if (confirm('Delete this transaction?')) {
                transactions = transactions.filter(t => t.id !== id);
                localStorage.setItem('financeTransactions', JSON.stringify(transactions));
                updateUI();
                renderMonthly();
            }
        }

        function updateUI() {
            const income = transactions.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
            const expense = transactions.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
            const balance = income - expense;

            const balanceEl = document.getElementById('balance');
            balanceEl.textContent = `₸${balance.toLocaleString()}`;
            balanceEl.className = `balance ${balance > 0 ? 'positive' : balance < 0 ? 'negative' : ''}`;
            document.getElementById('totalIncome').textContent = `₸${income.toLocaleString()}`;
            document.getElementById('totalExpense').textContent = `₸${expense.toLocaleString()}`;

            // Breakdown
            const breakdown = document.getElementById('breakdownList');
            const expTx = transactions.filter(t => t.type === 'expense');
            if (expTx.length === 0) {
                breakdown.innerHTML = `<div class="empty-state" style="padding:24px 20px"><p>No expenses yet</p></div>`;
            } else {
                const totals = {};
                expTx.forEach(t => { totals[t.category] = (totals[t.category] || 0) + t.amount; });
                const max = Math.max(...Object.values(totals));
                const sorted = Object.entries(totals).sort((a, b) => b[1] - a[1]);
                breakdown.innerHTML = sorted.map(([cat, total]) => `
                    <div class="breakdown-item">
                        <div class="breakdown-row">
                            <div class="breakdown-left">
                                <span class="breakdown-emoji">${icons[cat] || '📁'}</span>
                                <span class="breakdown-name">${cat}</span>
                            </div>
                            <span class="breakdown-amount">−₸${total.toLocaleString()}</span>
                        </div>
                        <div class="breakdown-bar-track">
                            <div class="breakdown-bar-fill" style="width:${(total/max*100).toFixed(1)}%"></div>
                        </div>
                    </div>
                `).join('');
            }

            // Recent list
            const list = document.getElementById('transactionList');
            if (transactions.length === 0) {
                list.innerHTML = `<div class="empty-state"><div class="empty-state-icon">○</div><p>No transactions yet</p></div>`;
                return;
            }

            list.innerHTML = transactions.map(t => `
                <div class="transaction-item">
                    <div class="transaction-info">
                        <div class="transaction-icon ${t.type}">${icons[t.category] || '📁'}</div>
                        <div class="transaction-details">
                            <h3>${t.category}</h3>
                            <p>${new Date(t.date).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' })}</p>
                        </div>
                    </div>
                    <div class="transaction-right">
                        <span class="transaction-amount ${t.type}">${t.type === 'income' ? '+' : '−'}₸${t.amount.toLocaleString()}</span>
                        <button class="delete-btn" onclick="deleteTransaction(${t.id})">×</button>
                    </div>
                </div>
            `).join('');
        }

        document.getElementById('modal').addEventListener('click', e => {
            if (e.target.id === 'modal') closeModal();
        });
    </script>
</body>
</html>
